<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="tela-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>

<body>

    <header>
        <nav class="area-navegacao">
            <img class="logo" src="imagens/logo-tia-sonia.png" alt="Logo do site" width="150px">
            <ul id="lista">
                <li><a class="icones" href="#home"><i class="fa-solid fa-house-chimney"></i></a></li>
                <li><a class="icones" href="#bordados"><i class="fa-solid fa-scissors"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-cart-arrow-down"></i></a></li>
                <li><a class="icones" href="cadastro.html"><i class="fa-solid fa-user-gear"></i></a></li>
            </ul>
        </nav>
    </header>

    <main class="area-cadastro">
        <section class="area-titulo">
            <h1>Login</h1>
        </section>
        <section class="area-formulario">
            <form action="#" class="form-cadastro">
                <div class="area-acesso formatacao">
                    <div class="email titulo-campo">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Digite seu email" required>
                    </div>
                    <div class="senha titulo-campo">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="●●●●●●●●" required>
                        <a href="#">Esqueceu a Senha?</a>
                    </div>
                </div>

                <div class="area-botao titulo-campo">
                    <button type="submit" id="botao-cadastrar"> Entrar </button>
                    <a href="cadastro.html" class="link-login">Não tem conta? Cadastre-se Já!</a>
                </div>
        </section>
    </main>
    
    <footer class="rodape">
        <nav class="nav-rodape">
            <p> Tia sonia agradece sdua visita. Ficou alguma duvida? entre em Contato com ela <a href="">por aqui</a>
                
            <p>Todos o Direitos Reservados ©</p>

            </p>
        </nav>
    </footer>
            
        

</body>
